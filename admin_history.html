<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zápis o stretnutí - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 0; color: #333; }
        
        /* WEB LAYOUT (Skryté pri tlači) */
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 300px; background: #244b94; color: white; overflow-y: auto; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .match-btn { background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .match-btn:hover { background: rgba(255,255,255,0.2); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background: #fff; }
        
        .action-bar { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-print { background: #d90f23; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 1em; }
        .btn-print:hover { background: #b00b1b; }

        /* REPORT LAYOUT (To, čo sa reálne vytlačí/uloží) */
        .report-container { max-width: 800px; margin: 0 auto; color: #000; }
        .r-header { text-align: center; margin-bottom: 30px; }
        .r-title { font-size: 1.5em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .r-meta { font-size: 0.9em; color: #555; }
        
        .r-score-box { text-align: center; margin-bottom: 30px; font-size: 1.2em; }
        .r-score { font-size: 2em; font-weight: bold; margin: 0 15px; }

        .r-section { margin-bottom: 25px; }
        .r-section-title { font-weight: bold; font-size: 1.1em; border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }

        .r-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        table.simple-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 0.9em; }
        table.simple-table th, table.simple-table td { border: 1px solid #888; padding: 6px; text-align: left; }
        table.simple-table th { background: #f9f9f9; }

        .r-notes { border: 1px solid #888; padding: 10px; min-height: 50px; white-space: pre-wrap; font-size: 0.9em; }

        /* MIESTO NA PODPIS */
        .signature-box { margin-top: 80px; display: flex; justify-content: flex-end; }
        .signature-line { width: 250px; text-align: center; border-top: 1px solid #000; padding-top: 8px; font-size: 0.9em; }

        /* ŠTÝLY PRE TLAČ / ULOŽENIE PDF */
        @media print {
            .sidebar, .action-bar { display: none !important; }
            .layout { display: block; height: auto; }
            .main-content { padding: 0; overflow: visible; background: none; }
            body { background: white; color: black; font-size: 12pt; }
            .report-container { max-width: 100%; margin: 0; }
            table.simple-table th { background: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="layout">
        <div class="sidebar no-print">
            <h2>Ukončené zápasy</h2>
            <div id="matchList"><p>Načítavam...</p></div>
        </div>

        <div class="main-content">
            <div class="action-bar no-print" id="actionBar" style="display: none;">
                <div><h3 style="margin:0;">Zápis pripravený</h3><small style="color:#666;">Tento dokument môžete uložiť ako PDF.</small></div>
                <button class="btn-print" onclick="window.print()">🖨️ Uložiť ako PDF</button>
            </div>

            <div class="report-container" id="reportArea">
                <p style="text-align:center; color:#888; margin-top:50px;">👈 Vyberte zápas z ľavého menu pre zobrazenie kompletného zápisu.</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://Lucifer21sk.pythonanywhere.com";

        async function loadFinishedMatches() {
            try {
                const res = await fetch(`${API_BASE}/matches`);
                const matches = await res.json();
                
                const finished = matches.filter(m => m.is_finished);
                const sidebar = document.getElementById("matchList");
                sidebar.innerHTML = "";

                if (finished.length === 0) {
                    sidebar.innerHTML = "<p>Žiadne ukončené zápasy.</p>";
                    return;
                }

                finished.forEach(m => {
                    sidebar.innerHTML += `
                        <div class="match-btn" onclick="generateReport(${m.id})">
                            <div style="font-weight:bold;">${m.home_team} vs ${m.away_team}</div>
                            <div style="font-size:0.8em; opacity:0.8;">${m.date} | ${m.home_score}:${m.away_score}</div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function generateReport(matchId) {
            document.getElementById("reportArea").innerHTML = "<p style='text-align:center;'>Generujem zápis...</p>";
            
            try {
                const res = await fetch(`${API_BASE}/matches/${matchId}/export`);
                
                if (!res.ok) {
                    document.getElementById("reportArea").innerHTML = "<p style='color:red; text-align:center;'>Chyba na serveri. Dáta sa nepodarilo stiahnuť.</p>";
                    return;
                }

                const data = await res.json();
                
                if (data.error) {
                    alert("Chyba: " + data.error);
                    return;
                }

                const m = data.match;
                const rep = data.report;
                
                let dateObj = new Date(m.started_at);
                let dateStr = isNaN(dateObj) ? m.started_at : dateObj.toLocaleDateString('sk-SK') + " " + dateObj.toLocaleTimeString('sk-SK', {hour: '2-digit', minute:'2-digit'});

                let homeRosterHtml = "";
                if (data.rosters && data.rosters.home) {
                    homeRosterHtml = data.rosters.home.map(p => `<tr><td style="width:30px; text-align:center;">${p.number}</td><td>${p.name}</td></tr>`).join("");
                }
                
                let awayRosterHtml = "";
                if (data.rosters && data.rosters.away) {
                    awayRosterHtml = data.rosters.away.map(p => `<tr><td style="width:30px; text-align:center;">${p.number}</td><td>${p.name}</td></tr>`).join("");
                }
                
                let goalsHtml = "";
                if (!data.goals || data.goals.length === 0) { 
                    goalsHtml = "<tr><td colspan='4' style='text-align:center;'>Žiadne góly.</td></tr>"; 
                } else {
                    goalsHtml = data.goals.map(g => {
                        let a1 = g.a1 ? g.a1 : ""; 
                        let a2 = g.a2 ? ", " + g.a2 : "";
                        let minStr = g.minute ? g.minute + "'" : "-";
                        return `<tr><td>${minStr}</td><td>${g.team}</td><td>${g.scorer}</td><td>${a1}${a2}</td></tr>`;
                    }).join("");
                }

                let pensHtml = "";
                if (!data.penalties || data.penalties.length === 0) { 
                    pensHtml = "<tr><td colspan='4' style='text-align:center;'>Žiadne tresty.</td></tr>"; 
                } else {
                    pensHtml = data.penalties.map(p => {
                        let minStr = p.minute ? p.minute + "'" : "-";
                        return `<tr><td>${minStr}</td><td>${p.team}</td><td>${p.player}</td><td>${p.reason}</td></tr>`;
                    }).join("");
                }

                let phaseStr = m.phase === 'normal' ? 'Základná hracia doba' : (m.phase === 'overtime' ? 'Po predĺžení' : 'Samostatné nájazdy');

                document.getElementById("reportArea").innerHTML = `
                    <div class="r-header">
                        <div class="r-title">Zápis o stretnutí</div>
                        <div class="r-meta">Dátum: ${dateStr} | Ukončenie: ${phaseStr}</div>
                    </div>

                    <div class="r-score-box">
                        <div style="font-weight:bold;">${m.home_team} <span class="r-score">${m.home_score} : ${m.away_score}</span> ${m.away_team}</div>
                    </div>

                    <div class="r-section">
                        <div class="r-section-title">Delegované osoby</div>
                        <table class="simple-table">
                            <tr><td style="width:150px; font-weight:bold;">Rozhodca:</td><td>${rep.referee || "-"}</td></tr>
                            <tr><td style="font-weight:bold;">Zdravotník:</td><td>${rep.doctor || "-"}</td></tr>
                        </table>
                    </div>

                    <div class="r-grid-2">
                        <div class="r-section">
                            <div class="r-section-title">Zostava: ${m.home_team}</div>
                            <table class="simple-table">
                                <thead><tr><th>Č.</th><th>Meno</th></tr></thead>
                                <tbody>${homeRosterHtml || "<tr><td colspan='2'>Nezadaná zostava</td></tr>"}</tbody>
                            </table>
                        </div>
                        <div class="r-section">
                            <div class="r-section-title">Zostava: ${m.away_team}</div>
                            <table class="simple-table">
                                <thead><tr><th>Č.</th><th>Meno</th></tr></thead>
                                <tbody>${awayRosterHtml || "<tr><td colspan='2'>Nezadaná zostava</td></tr>"}</tbody>
                            </table>
                        </div>
                    </div>

                    <div class="r-section">
                        <div class="r-section-title">Góly a asistencie</div>
                        <table class="simple-table">
                            <thead><tr><th style="width:50px;">Čas</th><th>Tím</th><th>Strelec</th><th>Asistencie</th></tr></thead>
                            <tbody>${goalsHtml}</tbody>
                        </table>
                    </div>

                    <div class="r-section">
                        <div class="r-section-title">Tresty</div>
                        <table class="simple-table">
                            <thead><tr><th style="width:50px;">Čas</th><th>Tím</th><th>Hráč</th><th>Dôvod / Typ trestu</th></tr></thead>
                            <tbody>${pensHtml}</tbody>
                        </table>
                    </div>

                    <div class="r-section">
                        <div class="r-section-title">Poznámky k zápasu</div>
                        <div class="r-notes">${rep.notes || "Bez poznámok."}</div>
                    </div>
                    
                    <div class="signature-box">
                        <div class="signature-line">
                            <strong>Podpis</strong>
                        </div>
                    </div>
                    
                    <div style="margin-top: 30px; text-align: left; font-size: 0.8em; color: #555;">
                        Vygenerované systémom SAILH.
                    </div>
                `;

                document.getElementById("actionBar").style.display = "flex";

            } catch (err) { 
                console.error(err); 
                document.getElementById("reportArea").innerHTML = "<p style='color:red; text-align:center;'>Kritická chyba pri spracovaní dát zo servera.</p>";
            }
        }

        loadFinishedMatches();
    </script>
</body>
</html>
