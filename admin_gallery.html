<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Admin - Správa Galérie</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #244b94; border-bottom: 2px solid #d90f23; padding-bottom: 10px; }
        .upload-box { background: #f9f9f9; padding: 20px; border: 2px dashed #ccc; border-radius: 8px; text-align: center; margin-bottom: 30px; }
        .upload-btn { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .admin-photo { position: relative; border-radius: 6px; overflow: hidden; background: #eee; }
        .admin-photo img { width: 100%; height: 120px; object-fit: cover; display: block; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Správa fotogalérie</h1>

    <div class="upload-box">
        <h3>Nová fotka</h3>
        <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp">
        <br>
        <button class="upload-btn" onclick="uploadPhoto()">⬆️ Nahrať na server</button>
        <p id="uploadStatus" style="color: #244b94; font-weight: bold;"></p>
    </div>

    <h3>Aktuálne fotky v galérii:</h3>
    <div class="admin-grid" id="adminGrid">
        <p>Načítavam...</p>
    </div>
</div>

<script>
    const API_BASE = "https://Lucifer21sk.pythonanywhere.com";

    // --- NEW: Image Compression Function ---
    async function compressImage(file, maxWidth = 1920, quality = 0.8) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // Resize if it's too wide
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Convert back to a smaller JPEG file
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        }));
                    }, 'image/jpeg', quality);
                };
            };
            reader.onerror = error => reject(error);
        });
    }

    // 1. Uploading the Photo (Now with compression!)
    async function uploadPhoto() {
        const fileInput = document.getElementById("fileInput");
        if (fileInput.files.length === 0) { alert("Vyber prosím fotku!"); return; }

        document.getElementById("uploadStatus").innerText = "Spracovávam a nahrávam fotku...";

        try {
            // Grab the original file
            let file = fileInput.files[0];
            
            // COMPRESS IT before uploading! (Max 1920px wide, 80% quality)
            file = await compressImage(file, 1920, 0.8);

            const formData = new FormData();
            formData.append("file", file);

            const res = await fetch(`${API_BASE}/admin/gallery/upload`, {
                method: "POST",
                body: formData
            });
            const data = await res.json();

            if (data.status === "ok") {
                document.getElementById("uploadStatus").innerText = "Úspešne nahraté za pár sekúnd!";
                fileInput.value = ""; // Clear input
                loadAdminGallery(); // Refresh the grid
            } else {
                alert("Chyba: " + data.error);
                document.getElementById("uploadStatus").innerText = "";
            }
        } catch (e) { 
            console.error(e); 
            alert("Chyba siete."); 
            document.getElementById("uploadStatus").innerText = "";
        }
    }

    // 2. Load photos into Admin
    async function loadAdminGallery() {
        const grid = document.getElementById("adminGrid");
        try {
            const res = await fetch(`${API_BASE}/gallery/images`);
            const images = await res.json();
            
            grid.innerHTML = "";
            if (images.length === 0) { grid.innerHTML = "<p>Galéria je prázdna.</p>"; return; }

            images.forEach(img => {
                grid.innerHTML += `
                    <div class="admin-photo">
                        <img src="${API_BASE}/photos/${img.filename}">
                        <button class="delete-btn" onclick="deletePhoto(${img.id})">X</button>
                    </div>
                `;
            });
        } catch (e) { console.error(e); }
    }

    // 3. Delete photos
    async function deletePhoto(id) {
        if (!confirm("Naozaj chceš zmazať túto fotku?")) return;
        
        try {
            await fetch(`${API_BASE}/admin/gallery/${id}/delete`, { method: "POST" });
            loadAdminGallery(); // Refresh grid
        } catch (e) { console.error(e); }
    }

    loadAdminGallery();
</script>

</body>
</html>
